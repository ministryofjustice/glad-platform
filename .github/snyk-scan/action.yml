name: Snyk Scan

description: Run Snyk dependency scan

inputs:
  snyk-token:
    description: Snyk API token
    required: true

runs:
  using: composite

  steps:
    - name: Set up Java
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        distribution: corretto
        java-version: '25'
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - name: Setup Snyk CLI
      uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

    - name: Scan glad-bom
      id: 'glad-bom'
      continue-on-error: true
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
      run: |
        snyk test \
        --package-manager=maven \
        --file=glad-bom/pom.xml \
        --severity-threshold=high \
        --sarif-file-output=snyk-glad-bom.sarif \
        --policy-path=./.snyk

    - name: Upload glad-bom SARIF
      if: always() && hashFiles('snyk-glad-bom.sarif') != ''
      uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
      with:
        sarif_file: snyk-glad-bom.sarif
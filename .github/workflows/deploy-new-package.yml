name: Publish Maven Package

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: maven-release

    steps:
      - name: Checkout Release Tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: corretto
          java-version: '25'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Determine module
        id: module
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"

          if [[ "$TAG" == glad-bom-* ]]; then
            echo "module=glad-bom" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == glad-parent-* ]]; then
            echo "module=glad-parent" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown release tag: $TAG"
            exit 1
          fi

      - name: Build module
        run: |
          mvn --batch-mode \
            -pl ${{ steps.module.outputs.module }} \
            clean verify

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Snyk Scan
        run: |
          snyk test \
            --file=${{ steps.module.outputs.module }}/pom.xml \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif \
            --policy-path=./.snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: snyk.sarif

      - name: Publish Maven Package
        run: |
          mvn --batch-mode \
            -pl ${{ steps.module.outputs.module }} \
            deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Publish Maven Package

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: maven-release

    steps:
      - name: Checkout Release Tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: corretto
          java-version: '25'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Determine module
        id: module
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"

          if [[ "$TAG" == glad-bom-* ]]; then
            echo "module=glad-bom" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == glad-parent-* ]]; then
            echo "module=glad-parent" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown release tag: $TAG"
            exit 1
          fi

      - name: Validate BOM dependency exists
        if: steps.module.outputs.module == 'glad-parent'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Validating glad-bom dependency is available..."

          GLAD_BOM_VERSION=$(mvn help:evaluate \
            -pl glad-parent \
            -Dexpression=glad-bom.version \
            -q \
            -DforceStdout)

          echo "glad-parent requires glad-bom:${GLAD_BOM_VERSION}"

          mvn --batch-mode dependency:get \
            -Dartifact=uk.gov.laa:glad-bom:${GLAD_BOM_VERSION}:pom \
            -DremoteRepositories=github::default::https://maven.pkg.github.com/ministryofjustice/glad-platform

      - name: Build module
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn --batch-mode \
            -f ${{ steps.module.outputs.module }}/pom.xml \
            clean verify

      - name: Snyk Scan
        uses: './.github/snyk-scan'
        with:
          snyk-token: ${{ secrets.SNYK_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Maven Package
        run: |
          mvn --batch-mode \
            -f ${{ steps.module.outputs.module }}/pom.xml \
            deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}